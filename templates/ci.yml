# .github/workflows/ci.yml
# Thin caller workflow — CI Gates (Pattern 1)
# Copy this file into your project repository's .github/workflows/ directory.
# Replace `lhuasheng/shared-sdlc` with your org/shared-sdlc if different.
# Pin @main to a release tag (e.g. @v1.0.0) once stable.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci-gates:
    name: CI Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: lhuasheng/shared-sdlc/actions/ci-gates@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          node-version: '20'
          lint-cmd: 'npm run lint'
          typecheck-cmd: 'npm run typecheck'
          test-cmd: 'npm run test:coverage'
          install-cmd: 'npm ci'
          max-pr-lines: '400'
