# .github/workflows/issue-triage.yml
# Thin caller workflow — Issue Triage (Pattern 3)
# Copy this file into your project repository's .github/workflows/ directory.
# Requires: GITHUB_TOKEN (auto-provided)

name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  triage:
    name: Issue Triage
    runs-on: ubuntu-latest
    steps:
      - uses: lhuasheng/shared-sdlc/actions/dispatch-agentic@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflow-repo: lhuasheng/.github
          workflow-ref: main
          workflow-file: issue-triage.md
          payload: |
            {
              "issue_number": "${{ github.event.issue.number }}",
              "repository": "${{ github.repository }}"
            }
