name: 'AI-SDLC On-Demand PR Review'
description: >
  Gate 3 — triggers the pr-review agentic workflow in response to an
  /ai-review comment on a PR. Implements Integration Pattern 4 (shared-sdlc
  dispatches agentic workflows). Falls back to the legacy Claude script if
  agentic-workflow-repo is not set.

inputs:
  github-token:
    description: >
      Token used to dispatch the agentic workflow. Must have actions:write on
      agentic-workflow-repo -- the default secrets.GITHUB_TOKEN cannot do this,
      since it is scoped only to the calling repository. Use a fine-grained PAT
      (or GitHub App token) with actions:write on agentic-workflow-repo instead.
      Only used for local pull-requests:write operations in the legacy fallback
      path (when agentic-workflow-repo is empty), where secrets.GITHUB_TOKEN is
      sufficient.
    required: true
  agentic-workflow-repo:
    description: 'owner/repo containing the compiled pr-review.lock.yml agentic workflow (usually the calling repo itself). Leave empty to use the legacy script fallback.'
    required: false
    default: ''
  agentic-workflow-ref:
    description: 'Branch/tag/SHA in agentic-workflow-repo to dispatch against'
    required: false
    default: 'main'
  # Legacy inputs — kept for backward compatibility; used only when agentic-workflow-repo is empty
  anthropic-api-key:
    description: '[DEPRECATED] Anthropic API key — only used by the legacy script fallback'
    required: false
    default: ''
  shared-sdlc-ref:
    description: '[DEPRECATED] Branch/tag/SHA of shared-sdlc for the legacy script fallback'
    required: false
    default: 'main'
  shared-sdlc-repo:
    description: '[DEPRECATED] owner/repo of shared-sdlc for the legacy script fallback'
    required: false
    default: 'lhuasheng/shared-sdlc'
  claude-model:
    description: '[DEPRECATED] Claude model ID for the legacy script fallback'
    required: false
    default: 'claude-sonnet-4-6'

runs:
  using: 'composite'
  steps:
    # ── Agentic path (preferred) ───────────────────────────────────────────────
    - name: Validate PR exists before dispatch
      if: inputs.agentic-workflow-repo != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        PR_NUMBER="${{ github.event.issue.number }}"
        REPO="${{ github.repository }}"
        if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "0" ]; then
          echo "::error::Cannot dispatch pr-review: github.event.issue.number is empty or zero"
          exit 1
        fi
        set +e
        gh api "repos/$REPO/pulls/$PR_NUMBER" > /dev/null 2>&1
        EXIT_CODE=$?
        set -e
        if [ "$EXIT_CODE" -ne 0 ]; then
          echo "::error::Cannot dispatch pr-review: PR #$PR_NUMBER does not exist in $REPO"
          exit 1
        fi
        echo "✅ PR #$PR_NUMBER confirmed in $REPO"

    - name: Dispatch pr-review agentic workflow
      if: inputs.agentic-workflow-repo != ''
      uses: lhuasheng/shared-sdlc/actions/dispatch-agentic@main
      with:
        github-token: ${{ inputs.github-token }}
        workflow-repo: ${{ inputs.agentic-workflow-repo }}
        workflow-ref: ${{ inputs.agentic-workflow-ref }}
        workflow-file: pr-review.lock.yml
        payload: |
          {
            "pr_number": "${{ github.event.issue.number }}",
            "repository": "${{ github.repository }}",
            "triggered_by": "${{ github.actor }}"
          }

    # ── Legacy script fallback (deprecated, kept for backward compatibility) ───
    - name: Set up Node (legacy fallback)
      if: inputs.agentic-workflow-repo == ''
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Fetch shared-sdlc script (legacy fallback)
      if: inputs.agentic-workflow-repo == ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        echo "::warning::Using deprecated legacy script fallback. Set agentic-workflow-repo to use the agentic workflow."
        gh api "repos/${{ inputs.shared-sdlc-repo }}/contents/scripts/pr-review.mjs?ref=${{ inputs.shared-sdlc-ref }}" \
          --jq '.content' | base64 -d > pr-review.mjs

    - name: Fetch PR diff and metadata (legacy fallback)
      if: inputs.agentic-workflow-repo == ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        PR=${{ github.event.issue.number }}
        gh pr diff "$PR" --patch --repo "${{ github.repository }}" > pr.diff
        gh pr view "$PR" --repo "${{ github.repository }}" \
          --json title,body,author,additions,deletions > pr_meta.json

    - name: Run Claude review (legacy fallback)
      if: inputs.agentic-workflow-repo == ''
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
      run: node pr-review.mjs

    - name: Post review comment (legacy fallback)
      if: inputs.agentic-workflow-repo == ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh pr comment ${{ github.event.issue.number }} \
          --repo "${{ github.repository }}" \
          --body-file review_comment.md
