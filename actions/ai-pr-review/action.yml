name: 'AI-SDLC On-Demand PR Review'
description: 'Gate 3 — Claude-powered PR pre-screen. Trigger by commenting /ai-review on a PR.'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key'
    required: true
  github-token:
    description: 'GitHub token with pull-requests:write'
    required: true
  shared-sdlc-ref:
    description: 'Branch/tag/SHA of shared-sdlc to read the script from'
    required: false
    default: 'main'
  shared-sdlc-repo:
    description: 'owner/repo of the shared-sdlc repository'
    required: true
  claude-model:
    description: 'Claude model ID'
    required: false
    default: 'claude-sonnet-4-6'

runs:
  using: 'composite'
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Fetch shared-sdlc script
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh api "repos/${{ inputs.shared-sdlc-repo }}/contents/scripts/pr-review.mjs?ref=${{ inputs.shared-sdlc-ref }}" \
          --jq '.content' | base64 -d > pr-review.mjs

    - name: Fetch PR diff and metadata
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        PR=${{ github.event.issue.number }}
        gh pr diff "$PR" --patch --repo "${{ github.repository }}" > pr.diff
        gh pr view "$PR" --repo "${{ github.repository }}" \
          --json title,body,author,additions,deletions > pr_meta.json

    - name: Run Claude review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
      run: node pr-review.mjs

    - name: Post review comment
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh pr comment ${{ github.event.issue.number }} \
          --repo "${{ github.repository }}" \
          --body-file review_comment.md
