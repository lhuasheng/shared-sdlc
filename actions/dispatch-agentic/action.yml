name: 'AI-SDLC Dispatch Agentic'
description: >
  Routes a human slash-command or automated trigger to a GitHub Agentic
  Workflow. Uses the GitHub CLI to dispatch the target workflow with a
  structured JSON payload. Implements Integration Pattern 4 (shared-sdlc
  dispatches agentic workflows).

inputs:
  github-token:
    description: 'GitHub token with actions:write on the agentic workflow repository'
    required: true
  workflow-repo:
    description: 'owner/repo that contains the compiled agentic workflow (usually the calling repo itself: ${{ github.repository }})'
    required: true
  workflow-ref:
    description: 'Branch, tag, or SHA in workflow-repo to dispatch against'
    required: false
    default: 'main'
  workflow-file:
    description: >
      Filename of the compiled agentic workflow to dispatch (e.g.
      pr-review.lock.yml). Must be the .lock.yml — GitHub Actions only
      registers .yml/.yaml files, so the .md source can never be dispatched.
    required: true
  payload:
    description: 'JSON string of inputs to forward to the agentic workflow'
    required: false
    default: '{}'

outputs:
  dispatch-status:
    description: 'HTTP status code returned by the workflow dispatch call'
    value: ${{ steps.dispatch.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        case "${{ inputs.workflow-file }}" in
          *.yml|*.yaml) ;;
          *)
            echo "::error::workflow-file must be a compiled .lock.yml (got '${{ inputs.workflow-file }}') — GitHub Actions cannot dispatch a .md file"
            exit 1
            ;;
        esac
        echo '${{ inputs.payload }}' | jq empty || {
          echo "::error::payload input is not valid JSON"
          exit 1
        }

    - name: Dispatch agentic workflow
      id: dispatch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # Build the request body with jq rather than `-f inputs=<string>`: the
        # dispatches API needs "inputs" as a nested JSON object, and -f always
        # sends its value as a plain string field.
        BODY=$(jq -n \
          --arg ref "${{ inputs.workflow-ref }}" \
          --argjson inputs '${{ inputs.payload }}' \
          '{ref: $ref, inputs: $inputs}')

        # Determine success from gh's own exit code rather than scraping
        # response text with head/awk, which breaks on stray stderr output
        # or embedded \r and corrupts the $GITHUB_OUTPUT file command.
        set +e
        RESPONSE=$(echo "$BODY" | gh api \
          --method POST \
          -H "Accept: application/vnd.github+json" \
          "repos/${{ inputs.workflow-repo }}/actions/workflows/${{ inputs.workflow-file }}/dispatches" \
          --input - 2>&1)
        EXIT_CODE=$?
        set -e

        if [ "$EXIT_CODE" -eq 0 ]; then
          HTTP_STATUS="204"
        else
          HTTP_STATUS=$(echo "$RESPONSE" | grep -oE 'HTTP [0-9]{3}' | grep -oE '[0-9]{3}' | head -1)
          HTTP_STATUS="${HTTP_STATUS:-unknown}"
          echo "::error::gh api dispatch call failed: $RESPONSE"
        fi

        echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
        echo "Dispatched ${{ inputs.workflow-file }} to ${{ inputs.workflow-repo }}@${{ inputs.workflow-ref }} — HTTP $HTTP_STATUS"

    - name: Confirm dispatch
      shell: bash
      run: |
        STATUS="${{ steps.dispatch.outputs.status }}"
        if [ "$STATUS" != "204" ] && [ "$STATUS" != "200" ]; then
          echo "::warning::Dispatch returned HTTP $STATUS — workflow may not have triggered"
        else
          echo "✅ Agentic workflow dispatched successfully"
        fi
