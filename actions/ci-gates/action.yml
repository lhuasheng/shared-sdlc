name: 'AI-SDLC CI Gates'
description: 'Gate 4 — runs lint, tests, PR-size, security, and spec-link checks. Configurable per project stack. Publishes ci-summary.json and security-report.json artifacts.'

inputs:
  node-version:
    description: 'Node version (set to empty to skip Node setup for non-Node stacks)'
    required: false
    default: '20'
  lint-cmd:
    description: 'Lint command (set empty to skip)'
    required: false
    default: 'npm run lint'
  typecheck-cmd:
    description: 'Type-check command (set empty to skip)'
    required: false
    default: 'npm run typecheck'
  test-cmd:
    description: 'Test command with coverage (set empty to skip)'
    required: false
    default: 'npm run test:coverage'
  install-cmd:
    description: 'Dependency install command'
    required: false
    default: 'npm ci'
  max-pr-lines:
    description: 'Max changed lines per PR (excluding lock/generated files)'
    required: false
    default: '400'

runs:
  using: 'composite'
  steps:
    - name: Record start time
      id: timing
      shell: bash
      run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

    - name: Set up Node
      if: inputs.node-version != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      if: inputs.install-cmd != ''
      shell: bash
      run: ${{ inputs.install-cmd }}

    - name: Lint
      id: lint
      if: inputs.lint-cmd != ''
      shell: bash
      run: |
        if ${{ inputs.lint-cmd }}; then
          echo "result=passed" >> "$GITHUB_OUTPUT"
        else
          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    - name: Type check
      id: typecheck
      if: inputs.typecheck-cmd != ''
      shell: bash
      run: |
        if ${{ inputs.typecheck-cmd }}; then
          echo "result=passed" >> "$GITHUB_OUTPUT"
        else
          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    - name: Tests with coverage
      id: tests
      if: inputs.test-cmd != ''
      shell: bash
      run: |
        if ${{ inputs.test-cmd }}; then
          echo "result=passed" >> "$GITHUB_OUTPUT"
        else
          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    - name: Upload coverage
      if: always() && inputs.test-cmd != ''
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        if-no-files-found: ignore

    - name: PR size check
      id: pr-size
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        git fetch origin "${{ github.base_ref }}" --depth=1
        LINES=$(git diff --stat "origin/${{ github.base_ref }}...HEAD" \
          -- ':!package-lock.json' ':!yarn.lock' ':!pnpm-lock.yaml' ':!poetry.lock' \
             ':!*.snap' ':!dist/*' ':!build/*' ':!*.generated.*' \
          | tail -1 | awk '{print $4+$6}')
        LINES=${LINES:-0}
        echo "Changed lines: $LINES (limit: ${{ inputs.max-pr-lines }})"
        if [ "$LINES" -gt "${{ inputs.max-pr-lines }}" ]; then
          echo "result=failed" >> "$GITHUB_OUTPUT"
          echo "::error::PR has $LINES changed lines (limit ${{ inputs.max-pr-lines }}). Split it."
          exit 1
        fi
        echo "result=passed" >> "$GITHUB_OUTPUT"

    - name: Audit dependencies
      id: audit
      if: inputs.install-cmd != '' && contains(inputs.install-cmd, 'npm')
      shell: bash
      run: |
        if npm audit --audit-level=high --json > npm_audit.json 2>&1; then
          echo "result=passed" >> "$GITHUB_OUTPUT"
        else
          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    - name: Scan for secrets
      id: secret-scan
      if: github.event_name == 'pull_request'
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.pull_request.base.sha }}
        head: ${{ github.event.pull_request.head.sha }}
        extra_args: --only-verified

    - name: Spec linkage check
      id: spec-link
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        BODY: ${{ github.event.pull_request.body }}
      run: |
        if echo "$BODY" | grep -qiE '(closes|fixes|resolves) #[0-9]+'; then
          echo "PR references an issue"
          echo "result=passed" >> "$GITHUB_OUTPUT"
        else
          echo "result=failed" >> "$GITHUB_OUTPUT"
          echo "::error::PR must reference an issue: 'Closes #NNN' in the description."
          exit 1
        fi

    - name: Publish ci-summary.json artifact
      if: always()
      shell: bash
      run: |
        COMPLETED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        STARTED_AT="${{ steps.timing.outputs.started_at }}"
        CONCLUSION="success"

        # Normalize secret-scan step outcome to passed/failed/skipped
        SS_OUTCOME="${SECRET_SCAN_RESULT:-}"
        if [ "$SS_OUTCOME" = "success" ]; then
          SS_RESULT="passed"
        elif [ "$SS_OUTCOME" = "failure" ]; then
          SS_RESULT="failed"
        else
          SS_RESULT="skipped"
        fi

        # Check if any step failed (including secret scan)
        for result in \
          "${{ steps.lint.outputs.result }}" \
          "${{ steps.typecheck.outputs.result }}" \
          "${{ steps.tests.outputs.result }}" \
          "${{ steps.pr-size.outputs.result }}" \
          "${{ steps.audit.outputs.result }}" \
          "${{ steps.spec-link.outputs.result }}" \
          "$SS_RESULT"; do
          if [ "$result" = "failed" ]; then
            CONCLUSION="failure"
            break
          fi
        done

        # Parse coverage if available
        COVERAGE_PCT="null"
        if [ -f coverage/coverage-summary.json ]; then
          COVERAGE_PCT=$(jq '.total.lines.pct // null' coverage/coverage-summary.json 2>/dev/null || echo "null")
        fi

        jq -n \
          --arg runId "${{ github.run_id }}" \
          --arg repo "${{ github.repository }}" \
          --arg ref "${{ github.ref_name }}" \
          --arg sha "${{ github.sha }}" \
          --argjson prNumber "$([ '${{ github.event.pull_request.number }}' != '' ] && echo '${{ github.event.pull_request.number }}' || echo 'null')" \
          --arg conclusion "$CONCLUSION" \
          --arg startedAt "$STARTED_AT" \
          --arg completedAt "$COMPLETED_AT" \
          --arg lint "${LINT_RESULT:-skipped}" \
          --arg typecheck "${TYPECHECK_RESULT:-skipped}" \
          --arg tests "${TESTS_RESULT:-skipped}" \
          --arg prSize "${PR_SIZE_RESULT:-skipped}" \
          --arg audit "${AUDIT_RESULT:-skipped}" \
          --arg secretScan "$SS_RESULT" \
          --arg specLink "${SPEC_LINK_RESULT:-skipped}" \
          --argjson coveragePct "$COVERAGE_PCT" \
          '{
            runId: ($runId | tonumber),
            repository: $repo,
            ref: $ref,
            sha: $sha,
            prNumber: $prNumber,
            conclusion: $conclusion,
            startedAt: $startedAt,
            completedAt: $completedAt,
            checks: {
              lint: $lint,
              typecheck: $typecheck,
              tests: $tests,
              prSize: $prSize,
              audit: $audit,
              secretScan: $secretScan,
              specLink: $specLink
            },
            coveragePct: $coveragePct
          }' > ci-summary.json
        echo "ci-summary.json written (conclusion: $CONCLUSION)"
      env:
        LINT_RESULT: ${{ steps.lint.outputs.result }}
        TYPECHECK_RESULT: ${{ steps.typecheck.outputs.result }}
        TESTS_RESULT: ${{ steps.tests.outputs.result }}
        PR_SIZE_RESULT: ${{ steps.pr-size.outputs.result }}
        AUDIT_RESULT: ${{ steps.audit.outputs.result }}
        SPEC_LINK_RESULT: ${{ steps.spec-link.outputs.result }}
        SECRET_SCAN_RESULT: ${{ steps.secret-scan.outcome }}

    - name: Publish security-report.json artifact
      if: always()
      shell: bash
      run: |
        SCANNED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        # Parse npm audit results
        VULN_COUNT=0
        AUDIT_PASSED=true
        if [ -f npm_audit.json ]; then
          VULN_COUNT=$(jq '[.vulnerabilities // {} | to_entries[] | select(.value.severity == "high" or .value.severity == "critical")] | length' npm_audit.json 2>/dev/null || echo 0)
          if [ "$VULN_COUNT" -gt 0 ]; then AUDIT_PASSED=false; fi
        fi

        # Derive secret-scan result from step outcome
        SECRET_PASSED=true
        SECRET_FINDINGS=0
        if [ "${SECRET_SCAN_RESULT:-}" = "failure" ]; then
          SECRET_PASSED=false
          SECRET_FINDINGS=-1
        fi

        jq -n \
          --arg runId "${{ github.run_id }}" \
          --arg repo "${{ github.repository }}" \
          --arg scannedAt "$SCANNED_AT" \
          --argjson prNumber "$([ '${{ github.event.pull_request.number }}' != '' ] && echo '${{ github.event.pull_request.number }}' || echo 'null')" \
          --argjson auditPassed "$AUDIT_PASSED" \
          --argjson vulnCount "$VULN_COUNT" \
          --argjson secretPassed "$SECRET_PASSED" \
          --argjson secretFindings "$SECRET_FINDINGS" \
          '{
            runId: ($runId | tonumber),
            repository: $repo,
            scannedAt: $scannedAt,
            prNumber: $prNumber,
            secretScan: { passed: $secretPassed, findingsCount: $secretFindings },
            dependencyAudit: {
              passed: $auditPassed,
              vulnerabilitiesCount: $vulnCount
            }
          }' > security-report.json
        echo "security-report.json written"
      env:
        SECRET_SCAN_RESULT: ${{ steps.secret-scan.outcome }}

    - name: Upload CI summary artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ci-summary
        path: ci-summary.json
        if-no-files-found: warn

    - name: Upload security report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.json
        if-no-files-found: warn
